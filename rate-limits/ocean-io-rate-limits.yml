description: >-
  Ocean.io does not publish API rate limits on its developer documentation. Quotas are credit-based
  and configured per contract; throttling returns HTTP 429.
notes: Contract-defined credit pools; specific RPS not published.
sources:
- https://ocean.io/help/api
responseCodes:
  throttled: 429
limits:
- name: Default
  scope: account
  metric: credits
  limit: contract-defined
  notes: Monthly credit pool; specific RPS not documented.
policies:
- name: Backoff Strategy
  description: Honor 429 with exponential backoff and Retry-After.
